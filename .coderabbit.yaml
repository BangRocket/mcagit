# CodeRabbit configuration — path-scoped review guidance keyed to mcagit's invariants.
# https://docs.coderabbit.ai/guides/configure-coderabbit
language: en-US

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false

  path_instructions:
    - path: "crates/nbt/**"
      instructions: >
        Canonical determinism is load-bearing. The canonical encoding must produce identical
        bytes regardless of on-disk compression or map ordering, and must never depend on a
        diff-path normalization. Type-tagged JSON must round-trip losslessly — longs beyond
        2^53 and float/double NaN/Inf are string-encoded, never JSON numbers. Thread a depth
        limit through any new recursive NBT walk.
    - path: "crates/diff/**"
      instructions: >
        There is ONE comparison walk: the comparer + DiffSink feed both the display diff and the
        patch extractor, so they can't drift. Lists that behave as sets are matched by identity
        (block coords, entity UUID, Slot, string id), not position. Diff-only normalizations
        belong here, never on the canonical/storage path.
    - path: "crates/patch/**"
      instructions: >
        Patches record both base and value (invertible) and apply is 3-way guarded — a node
        changes only if the target matches the recorded base, else it's a reported conflict.
        Apply NEVER mutates the target; it writes a fresh output world.
    - path: "crates/repo/**"
      instructions: >
        Exit codes follow git (0 clean / 1 differences-or-conflicts / 2 error). commit→checkout
        must reproduce a playable world; verify re-hashes a world's canonical tree against a
        commit. Untrusted input (manifest keys, ref names, received packs) is path-confined
        before being materialized to disk; every inflate of untrusted bytes is size-bounded and
        NBT depth is checked before parsing.
    - path: "crates/cli/**"
      instructions: >
        Validate args and return clean git-style exit codes; never surface a raw panic (map
        failures to "mcagit: error: <msg>" + exit 2). Destructive worktree ops confirm unless
        forced or non-interactive.
    - path: "crates/anvil/**"
      instructions: >
        Region read/write and chunk codecs (zlib/gzip/none/lz4) must round-trip decode→encode→
        decode to identical NBT. Bound every inflate of untrusted bytes. Type 127 (Custom) is
        opaque and falls back to a raw blob; do not claim LZ4 (type 4) is unsupported.

  tools:
    markdownlint:
      enabled: true

knowledge_base:
  learnings:
    scope: local
