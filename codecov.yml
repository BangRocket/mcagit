# Codecov configuration. Coverage is advisory in this repo — the test jobs
# are the blocking gate. The Codecov status check exists to surface drift in
# PR review, not to fail builds on small fluctuations.

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 0%
        informational: true

comment:
  layout: "header, diff, files, footer"
  behavior: default
  require_changes: true

ignore:
  - "tests/**"
