name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  e2e:
    name: e2e round-trip (sample worlds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: round-trip on compare-worlds
        run: |
          set -u
          BIN=target/release/mcagit
          OLD=compare-worlds/New_World_Older
          NEW=compare-worlds/New_World_Newer
          # cross-diff must find changes (exit 1)
          if "$BIN" diff "$OLD" "$NEW" >/dev/null; then echo "FAIL: expected differences"; exit 1; fi
          # forward patch: apply(OLD, fwd) reproduces NEW
          "$BIN" extract "$OLD" "$NEW" --out fwd.mcapatch
          "$BIN" apply fwd.mcapatch "$OLD" --out fwd_out
          "$BIN" diff fwd_out "$NEW" || { echo "FAIL: forward patch mismatch"; exit 1; }
          # reverse patch: apply --reverse(NEW, fwd) reproduces OLD
          "$BIN" apply --reverse fwd.mcapatch "$NEW" --out rev_out
          "$BIN" diff rev_out "$OLD" || { echo "FAIL: reverse patch mismatch"; exit 1; }
          # commit -> checkout reproduces the world; verify confirms the tree; fsck is clean
          "$BIN" init repo
          H=$("$BIN" -C repo commit -m newer "$NEW")
          "$BIN" -C repo checkout "$H" co
          "$BIN" -C repo verify "$H" co
          "$BIN" -C repo fsck
          echo "e2e OK"
