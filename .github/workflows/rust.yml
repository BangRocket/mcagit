name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all

  e2e:
    name: e2e round-trip (sample worlds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: round-trip on compare-worlds
        run: |
          set -u
          BIN=target/release/mcagit
          OLD=compare-worlds/New_World_Older
          NEW=compare-worlds/New_World_Newer
          # cross-diff must find changes (exit 1)
          if "$BIN" diff "$OLD" "$NEW" >/dev/null; then echo "FAIL: expected differences"; exit 1; fi
          # forward patch: apply(OLD, fwd) reproduces NEW
          "$BIN" extract "$OLD" "$NEW" --out fwd.mcapatch
          "$BIN" apply fwd.mcapatch "$OLD" --out fwd_out
          "$BIN" diff fwd_out "$NEW" || { echo "FAIL: forward patch mismatch"; exit 1; }
          # reverse patch: apply --reverse(NEW, fwd) reproduces OLD
          "$BIN" apply --reverse fwd.mcapatch "$NEW" --out rev_out
          "$BIN" diff rev_out "$OLD" || { echo "FAIL: reverse patch mismatch"; exit 1; }
          # commit -> checkout reproduces the world; verify confirms the tree; fsck is clean
          "$BIN" init repo
          H=$("$BIN" -C repo commit -m newer "$NEW")
          "$BIN" -C repo checkout "$H" co
          "$BIN" -C repo verify "$H" co
          "$BIN" -C repo fsck
          echo "e2e OK"
      - name: http transport round-trip (serve + push/clone/fetch)
        run: |
          set -u
          BIN=target/release/mcagit
          NEW=compare-worlds/New_World_Newer
          "$BIN" serve hub --addr 127.0.0.1:5099 >serve.log 2>&1 &
          SRV=$!; sleep 2
          "$BIN" init local
          H=$("$BIN" -C local commit -m w "$NEW")
          "$BIN" -C local push http://127.0.0.1:5099/r/world main
          "$BIN" -C local ls-remote http://127.0.0.1:5099/r/world | grep -q "$H" || { echo "FAIL: ls-remote"; kill $SRV; exit 1; }
          "$BIN" clone http://127.0.0.1:5099/r/world cloned
          "$BIN" -C cloned checkout "$H" out
          "$BIN" -C cloned verify "$H" out || { echo "FAIL: cloned world does not verify"; kill $SRV; exit 1; }
          kill $SRV 2>/dev/null || true
          echo "http e2e OK"
