name: codeql

# Static security analysis. mcadiff parses untrusted binary input (region
# files, NBT, patches, packfiles) and ships a network server — exactly the
# profile CodeQL's C# taint-tracking queries are built for. `build-mode: none`
# analyzes from source without a full build.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '14 3 * * 1'   # weekly sweep picks up newly-released queries

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF results
      actions: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          languages: csharp
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@d77b13a0df3134d64a457ea9003f600b09fa1c8a # v3
        with:
          category: "/language:csharp"
