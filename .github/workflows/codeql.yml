name: codeql

# Static security analysis. mcagit parses untrusted binary input (region
# files, NBT, patches, packfiles) and ships a network server — exactly the
# profile CodeQL's C# taint-tracking queries are built for. `build-mode: none`
# analyzes from source without a full build.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '14 3 * * 1'   # weekly sweep picks up newly-released queries

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF results
      actions: read
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"
