name: markdownlint

# Lints the project's human-facing markdown (README, CLAUDE.md). Config and
# scope (ignores .claude/** tooling docs) live in .markdownlint-cli2.jsonc.
# This check IS expected to stay green — make it a required status check.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'
      - '.github/workflows/markdownlint.yml'

permissions:
  contents: read

concurrency:
  group: markdownlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '**/*.md'
