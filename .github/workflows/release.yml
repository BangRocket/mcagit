name: release

# Builds self-contained, single-file mcadiff binaries for every supported
# platform and publishes them as a GitHub Release. Triggered manually via the
# Actions UI (`workflow_dispatch`) or via the `/release` ChatOps command on a
# merged PR (release-on-comment.yml dispatches here).
#
# Always builds whatever is at `main` HEAD — the triggering PR is just the
# cut-point marker, not the specific commit being released. That fits the
# "merge a batch of PRs, then decide it's worth shipping" workflow.

on:
  workflow_dispatch:
    inputs:
      triggering_pr:
        description: 'PR # that triggered this release (informational, optional)'
        required: false

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: publish binaries
    # Belt-and-suspenders: the ChatOps path already dispatches with --ref main,
    # and checkout pins ref: main below; this stops a UI dispatch from a stale
    # branch running that branch's copy of this workflow.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 9.0.x
      - name: stamp version
        id: stamp
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE=$(date -u +%Y%m%d)
          echo "tag=v${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - name: publish all runtimes
        # Self-contained single-file; NOT trimmed — the repo objects and
        # patch format go through reflection-based System.Text.Json, which
        # trimming breaks. zip for Windows, tar.gz for Unix (preserves the
        # executable bit, which a raw release asset would lose).
        env:
          TAG: ${{ steps.stamp.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for RID in win-x64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish src/McaDiff -c Release -r "$RID" --self-contained \
              -p:PublishSingleFile=true -o "publish/$RID"
            case "$RID" in
              win-*) (cd "publish/$RID" && zip -q "../../artifacts/mcadiff-${TAG}-${RID}.zip" mcadiff.exe) ;;
              *)     tar -czf "artifacts/mcadiff-${TAG}-${RID}.tar.gz" -C "publish/$RID" mcadiff ;;
            esac
          done
          (cd artifacts && sha256sum ./* > SHA256SUMS)
          ls -l artifacts
      - name: smoke-test published binary
        # The test suite exercises `dotnet run`, not the published single-file
        # artifact — publish-specific breakage (e.g. trimming ever getting
        # turned on and killing reflection-based JSON) is only caught here.
        run: |
          set -euo pipefail
          ./publish/linux-x64/mcadiff --help >/dev/null
          ./publish/linux-x64/mcadiff compare-worlds/New_World_Older compare-worlds/New_World_Older
      - name: create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TRIGGERING_PR: ${{ inputs.triggering_pr }}
          TAG: ${{ steps.stamp.outputs.tag }}
        run: |
          set -euo pipefail
          BODY="mcadiff build from commit \`${GITHUB_SHA}\`."
          if [ -n "${TRIGGERING_PR}" ]; then
            BODY="$(printf '%s\n\n%s' "${BODY}" "Dispatched from PR #${TRIGGERING_PR}.")"
          fi
          gh release create "${TAG}" \
            --title "mcadiff ${TAG}" \
            --notes "${BODY}" \
            artifacts/*
