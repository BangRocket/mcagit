name: release-on-comment

# ChatOps trigger for release.yml: a maintainer comments `/release` on a
# merged PR and this workflow validates the comment and dispatches the
# release. Manual `gh workflow run release.yml --ref main` and the Actions-UI
# button still work — this is an additional trigger, not a replacement.
#
# Security: `issue_comment` workflows always run from the *base* branch's
# workflow definition, so a fork PR can't introduce a malicious version of
# this file. We additionally gate on the commenter having write permission,
# since `issue_comment` otherwise fires for any user who can comment. All
# user-controlled values are routed through `env:` (never inline `${{ }}`
# in run blocks) — the canonical script-injection mitigation.

on:
  issue_comment:
    types: [created]

permissions: {}

concurrency:
  group: release-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: validate + dispatch release
    # Cheap pre-filter so we don't spin a runner on every PR comment; the
    # strict `^/release(\s|$)` match happens in the first step (excludes
    # `/releasenotes` etc. — Actions expressions have no regex).
    if: |
      github.event.issue.pull_request != null
      && startsWith(github.event.comment.body, '/release')
    runs-on: ubuntu-latest
    permissions:
      issues: write          # reactions + PR comments (stored as issue comments)
      pull-requests: write
      actions: write         # dispatch release.yml
      contents: read
    timeout-minutes: 10
    env:
      GH_REPO: ${{ github.repository }}
    steps:
      - name: validate command shape
        id: cmd
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          FIRST_LINE=$(printf '%s' "$BODY" | head -n1)
          if printf '%s' "$FIRST_LINE" | grep -Eq '^/release([[:space:]]|$)'; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 👀 acknowledge receipt
        if: steps.cmd.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api -X POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=eyes >/dev/null

      - name: validate commenter has write access
        if: steps.cmd.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.event.comment.user.login }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          PERM=$(gh api "repos/${REPO}/collaborators/${ACTOR}/permission" --jq '.permission')
          echo "actor=${ACTOR} permission=${PERM}"
          case "$PERM" in
            admin|maintain|write) echo "ok" ;;
            *)
              gh api -X POST \
                "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
                -f content=-1 >/dev/null
              gh pr comment "$PR" \
                --body "@${ACTOR} \`/release\` requires repo write permission. (You have \`${PERM}\`.)"
              exit 1
              ;;
          esac

      - name: ensure PR is merged
        if: steps.cmd.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          MERGED=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.merged')
          if [ "$MERGED" != "true" ]; then
            gh api -X POST \
              "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
              -f content=-1 >/dev/null
            gh pr comment "$PR" \
              --body "Can't \`/release\` from an open PR — the release builds from \`main\` HEAD, so merge first, then comment \`/release\` again."
            exit 1
          fi

      - name: dispatch release.yml
        if: steps.cmd.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.issue.number }}
        run: |
          gh workflow run release.yml --ref main -f "triggering_pr=${PR}"

      - name: 🚀 acknowledge dispatch
        if: steps.cmd.outputs.matched == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
          PR: ${{ github.event.issue.number }}
          ACTOR: ${{ github.event.comment.user.login }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          gh api -X POST \
            "repos/${REPO}/issues/comments/${COMMENT_ID}/reactions" \
            -f content=rocket >/dev/null
          gh pr comment "$PR" \
            --body "🚀 Release dispatched by @${ACTOR}. Watch [release runs](${SERVER_URL}/${REPO}/actions/workflows/release.yml)."
